[theme]
base = "dark"
primaryColor = "#7c6fea"
backgroundColor = "#080b12"
secondaryBackgroundColor = "#0e1219"
textColor = "#f1f4f9"
font = "sans serif"

[server]
headless = true
port = 8501
address = "0.0.0.0"
enableCORS = false
enableXsrfProtection = false
enableWebsocketCompression = false
maxMessageSize = 200

